<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        
        <h1 class="title">Formulário de Doação de Sangue</h1>
        <form action="" id="formulario">

            <label>Nome Completo:</label>
            <input type="text" id="nome" placeholder="Nome">
            <br>

             <label for="">Email:</label>
            <input type="email" id="email" placeholder="exemplo@gmail.com">
            <br>

            <label for="">Idade:</label>
            <input type="text" id="idade" placeholder="0">
            <br>

            <label for="">Peso:</label>
            <input type="number" id="peso" placeholder="67">
            <br>
           
            <label for="">Telefone:</label>
            <input type="text" id="telefone" placeholder="47998765432">
            <br>

            <label for="">CPF:</label>
            <input type="text" id="cpf" placeholder="12345678900" >
            <br>

            <label for="">Cidade</label>
            <input type="text" id="cidade" placeholder="Joinville">
            <br>

            <label for="">Estado</label>
            <input type="text" id="estado" placeholder="SC">
            <br>

            <label>Tipo Sanguíneo:</label>
            <input type="radio" name="tipo" value="A+"> A+
            <input type="radio" name="tipo" value="A-"> A-
            <input type="radio" name="tipo" value="B+"> B+
            <input type="radio" name="tipo" value="B-"> B-
            <br>
            <input type="radio" name="tipo" value="AB+"> AB+
            <input type="radio" name="tipo" value="AB-"> AB-
            <input type="radio" name="tipo" value="O+"> O+
            <input type="radio" name="tipo" value="O-"> O-
            <br>
            <br>
            <button type="submit" id="submit">Enviar</button>
        </form>
        <div id="result"></div>
        <div id="tabela"></div>
    </div>
<script src="script.js"></script>
</body>
</html>
