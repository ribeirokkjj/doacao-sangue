<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        
        <h1 class="title">Formulário de Doação de Sangue</h1>
        <form action="">

            <label>Nome Completo:</label>
            <input type="text" id="nome" placeholder="Nome"><br>

            <label for="">Email:</label>
            <input type="email" id="email" placeholder="exemplo@gmail.com">
            <div></div>

            <label for="">Telefone:</label>
            <input type="text" id="telefone" placeholder="47998765432">
            <div></div>

            <label for="">CPF:</label>
            <input type="text" id="cpf" placeholder="12345678900" >
            <div></div>

            <label for="">Idade:</label>
            <input type="text" id="idade" placeholder="0">
            <div></div>

        </form>
    </div>
<script src="script.js"></script>
</body>
</html>
